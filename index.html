<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=5,viewport-fit=cover" />
<meta name="theme-color" content="#0b1220" />
<title>Tablero General · TG</title>
<style>
  :root{
    --bg:#0b1220;
    --panel:#10192c;
    --panel-2:#16223b;
    --line:#1f2c4a;
    --text:#e8edf7;
    --muted:#90a0c0;
    --accent:#ffb020;
    --accent-2:#ff5252;
    --ok:#37d399;
    --r:14px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);
    font-family:"Inter",system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
    -webkit-tap-highlight-color:transparent;overscroll-behavior:none}
  body{min-height:100vh;min-height:100dvh;display:flex;flex-direction:column}

  header{
    padding:14px 16px 10px;
    background:linear-gradient(180deg,#0e1830 0%,#0b1220 100%);
    border-bottom:1px solid var(--line);position:sticky;top:0;z-index:5
  }
  header .row{display:flex;align-items:center;justify-content:space-between;gap:10px}
  header h1{margin:0;font-size:15px;letter-spacing:.5px;font-weight:700}
  header .sub{font-size:11px;color:var(--muted);margin-top:2px;letter-spacing:.3px}
  .badge{font-size:10px;padding:4px 8px;border:1px solid var(--line);border-radius:999px;color:var(--muted)}
  .toolbar{display:flex;gap:6px}
  .iconbtn{
    background:var(--panel);border:1px solid var(--line);color:var(--text);
    width:36px;height:36px;border-radius:10px;display:grid;place-items:center;cursor:pointer;
    transition:transform .15s ease,background .15s ease
  }
  .iconbtn:active{transform:scale(.94)}
  .iconbtn.active{background:#2a1a00;border-color:#5a3a00;color:var(--accent)}

  main{flex:1;position:relative;overflow:hidden;background:
    radial-gradient(1200px 600px at 50% -10%,#142146 0%,transparent 60%),
    var(--bg)}
  #stage{
    position:absolute;inset:0;display:grid;place-items:center;
    padding:8px 8px 240px;
  }
  #board-wrap{position:relative;width:100%;max-width:680px;max-height:100%;
    aspect-ratio:3816/3296;display:block}
  #board{position:absolute;inset:0;width:100%;height:100%}
  #board svg{width:100%;height:100%;display:block;
    filter:drop-shadow(0 12px 28px rgba(0,0,0,.45))}

  /* Skeleton */
  #loading{position:absolute;inset:0;display:grid;place-items:center;color:var(--muted);font-size:13px;letter-spacing:.5px}
  #loading.hidden{display:none}

  /* Hotspots overlay sits above the SVG inside the wrap */
  #hotspots{position:absolute;inset:0;width:100%;height:100%;pointer-events:none}
  #hotspots rect{pointer-events:auto;cursor:pointer}

  /* Debug mode shows the rectangles */
  body.debug #hotspots rect{
    fill:rgba(255,80,80,.08);
    stroke:#ff5252;stroke-width:6;stroke-dasharray:14 10
  }
  body.debug #hotspots text{fill:#fff;font-weight:700;font-size:80px;
    paint-order:stroke;stroke:#000;stroke-width:6}

  /* selection glow */
  #hotspots rect.selected{
    fill:rgba(255,176,32,.18);
    stroke:var(--accent);stroke-width:10;stroke-dasharray:0;
    animation:pulse 1.4s ease-in-out infinite
  }
  @keyframes pulse{
    0%,100%{filter:drop-shadow(0 0 0 rgba(255,176,32,.0))}
    50%   {filter:drop-shadow(0 0 14px rgba(255,176,32,.55))}
  }

  /* Bottom sheet */
  #sheet{
    position:fixed;left:0;right:0;bottom:0;z-index:20;
    background:linear-gradient(180deg,var(--panel) 0%,var(--panel-2) 100%);
    border-top:1px solid var(--line);
    border-radius:22px 22px 0 0;
    box-shadow:0 -16px 40px rgba(0,0,0,.5);
    transform:translateY(calc(100% - 76px));
    transition:transform .35s cubic-bezier(.2,.9,.25,1);
    padding:8px 18px max(18px,env(safe-area-inset-bottom));
    max-height:75vh;max-height:75dvh;overflow:hidden;
  }
  #sheet.open{transform:translateY(0)}
  #sheet .grab{width:42px;height:5px;border-radius:99px;background:#33446b;margin:8px auto 6px;display:block}
  #sheet .head{
    display:flex;align-items:center;justify-content:space-between;gap:12px;
    padding:6px 2px 10px
  }
  #sheet .tag{
    display:inline-flex;align-items:center;gap:6px;font-size:11px;color:var(--muted);
    border:1px solid var(--line);padding:5px 10px;border-radius:999px;background:rgba(255,255,255,.02)
  }
  #sheet .tag .dot{width:7px;height:7px;border-radius:99px;background:var(--ok)}
  #sheet h2{margin:2px 0 2px;font-size:18px;font-weight:700;letter-spacing:.3px}
  #sheet .close{
    background:transparent;border:1px solid var(--line);color:var(--text);
    width:34px;height:34px;border-radius:10px;display:grid;place-items:center;cursor:pointer
  }
  #sheet .body{padding:4px 0 14px}
  .grid-info{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:6px}
  .info{
    background:rgba(255,255,255,.03);border:1px solid var(--line);
    border-radius:12px;padding:10px 12px
  }
  .info .k{font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px}
  .info .v{font-size:15px;font-weight:600;margin-top:3px}
  .desc{font-size:13.5px;line-height:1.5;color:#cdd6ea;margin-top:12px;white-space:pre-wrap}

  /* Hint when nothing selected */
  #sheet.hint .body{display:none}
  #sheet.hint .head h2{color:var(--muted);font-weight:500}
  #sheet.hint .tag{display:none}

  /* tiny helper */
  .kbd{
    font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:11px;
    background:rgba(255,255,255,.06);padding:2px 6px;border-radius:6px;color:#cdd6ea
  }

  @media (min-width:720px){
    #sheet{max-width:560px;left:50%;transform:translate(-50%,calc(100% - 76px));border-radius:22px}
    #sheet.open{transform:translate(-50%,0)}
  }
</style>
</head>
<body>

<header>
  <div class="row">
    <div>
      <h1>TABLERO GENERAL · TG</h1>
      <div class="sub">380 V + N · 3F · 60 Hz · Oficina Prados del Paraíso</div>
    </div>
    <div class="toolbar">
      <button class="iconbtn" id="btn-debug" title="Mostrar/Ocultar zonas" aria-label="Debug">
        <!-- target icon -->
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="4"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/></svg>
      </button>
      <button class="iconbtn" id="btn-reset" title="Reiniciar selección" aria-label="Reiniciar">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 3-6.7"/><path d="M3 4v5h5"/></svg>
      </button>
    </div>
  </div>
</header>

<main>
  <div id="stage">
    <div id="board-wrap">
      <div id="board"></div>
      <svg id="hotspots" viewBox="0 0 3816 3296" preserveAspectRatio="xMidYMid meet" aria-hidden="true"></svg>
      <div id="loading">Cargando tablero…</div>
    </div>
  </div>
</main>

<aside id="sheet" class="hint" aria-live="polite">
  <span class="grab"></span>
  <div class="head">
    <div>
      <span class="tag"><span class="dot"></span><span id="sh-tag">Activo</span></span>
      <h2 id="sh-title">Toca un interruptor para ver detalles</h2>
    </div>
    <button class="close" id="sh-close" aria-label="Cerrar">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
    </button>
  </div>
  <div class="body">
    <div class="grid-info" id="sh-grid"></div>
    <div class="desc" id="sh-desc"></div>
  </div>
</aside>

<script>
/* =========================================================
   1) DATOS DE CIRCUITOS
   Editá libremente. Cada item: titulo, etiqueta, calibre,
   seccion, fase, descripcion (opcional).
   ========================================================= */
const DATA = {
  IG: { title:"Interruptor General",  label:"IG",
        calibre:"3×32 A", seccion:"25 mm²", fase:"3F + N",
        marca:"CHINT NM1-63H", desc:"Protección general del tablero TG. Corta toda la alimentación 380 V + N." },
  C1: { title:"Circuito 1", label:"C1", calibre:"16 A", seccion:"2.5 mm²", fase:"R", desc:"Iluminación / tomas oficina." },
  C2: { title:"Circuito 2", label:"C2", calibre:"16 A", seccion:"2.5 mm²", fase:"S", desc:"Iluminación / tomas oficina." },
  C3: { title:"Circuito 3", label:"C3", calibre:"20 A", seccion:"4 mm²",   fase:"T", desc:"Tomacorrientes generales." },
  C4: { title:"Circuito 4", label:"C4", calibre:"20 A", seccion:"4 mm²",   fase:"R", desc:"Tomacorrientes generales." },
  C5: { title:"Circuito 5", label:"C5", calibre:"20 A", seccion:"4 mm²",   fase:"S", desc:"Tomacorrientes generales." },
  C6: { title:"Circuito 6", label:"C6", calibre:"20 A", seccion:"4 mm²",   fase:"R", desc:"Tomacorrientes generales." },
  C7: { title:"Circuito 7", label:"C7", calibre:"20 A", seccion:"4 mm²",   fase:"S", desc:"Tomacorrientes generales." },
  C8: { title:"Circuito 8", label:"C8", calibre:"20 A", seccion:"4 mm²",   fase:"T", desc:"Tomacorrientes generales." },
  C9: { title:"Circuito 9", label:"C9", calibre:"20 A", seccion:"4 mm²",   fase:"R", desc:"Tomacorrientes generales." },
};

/* =========================================================
   2) ZONAS CLICKEABLES (coordenadas en viewBox 3816×3296)
   Posiciones detectadas automáticamente sobre los
   termomagnéticos visibles del SVG. Activá el modo debug
   (icono diana en la cabecera) para verlas y ajustarlas.
   ========================================================= */
const HOTSPOTS = [
  // ── Interruptor General (CHINT, arriba al centro) ──────
  { id:"IG", x:1620, y:100,  w:580, h:780 },

  // ── Lado DERECHO (C1-C5) – de arriba hacia abajo ───────
  { id:"C1", x:2540, y:1240, w:1100, h:380 },  // fila 1
  { id:"C2", x:2540, y:1630, w:1100, h:380 },  // fila 2
  { id:"C3", x:2540, y:2030, w:1100, h:380 },  // fila 3
  { id:"C4", x:2540, y:2430, w:1100, h:380 },  // fila 4
  { id:"C5", x:2540, y:2820, w:1100, h:380 },  // fila 5

  // ── Lado IZQUIERDO (C6-C9) – de arriba hacia abajo ─────
  { id:"C6", x:180,  y:1240, w:1100, h:380 },  // fila 1
  { id:"C7", x:180,  y:1630, w:1100, h:380 },  // fila 2
  { id:"C8", x:180,  y:2030, w:1100, h:380 },  // fila 3
  { id:"C9", x:180,  y:2430, w:1100, h:380 },  // fila 4
];

/* =========================================================
   3) Carga del SVG
   ========================================================= */
async function loadBoard(){
  const board = document.getElementById('board');
  const loading = document.getElementById('loading');
  try{
    const res = await fetch('tablero.svg',{cache:'force-cache'});
    if(!res.ok) throw new Error('No se pudo cargar tablero.svg');
    const txt = await res.text();
    board.innerHTML = txt;
    const svg = board.querySelector('svg');
    if(svg){
      svg.setAttribute('preserveAspectRatio','xMidYMid meet');
      svg.removeAttribute('width');
      svg.removeAttribute('height');
    }
    loading.classList.add('hidden');
    drawHotspots();
  }catch(err){
    loading.textContent = 'Error: '+err.message;
  }
}

/* =========================================================
   4) Crea los rectángulos clickeables encima del SVG
   ========================================================= */
function drawHotspots(){
  const svgNS = 'http://www.w3.org/2000/svg';
  const layer = document.getElementById('hotspots');
  layer.innerHTML = '';
  HOTSPOTS.forEach(h=>{
    const r = document.createElementNS(svgNS,'rect');
    r.setAttribute('id','hs-'+h.id);
    r.setAttribute('data-id',h.id);
    r.setAttribute('x',h.x); r.setAttribute('y',h.y);
    r.setAttribute('width',h.w); r.setAttribute('height',h.h);
    r.setAttribute('rx',24); r.setAttribute('ry',24);
    r.setAttribute('fill','transparent');
    r.setAttribute('stroke','none');
    r.addEventListener('click',()=>select(h.id));
    layer.appendChild(r);

    // etiqueta sólo visible en debug
    const t = document.createElementNS(svgNS,'text');
    t.setAttribute('x', h.x + h.w/2);
    t.setAttribute('y', h.y + h.h/2 + 28);
    t.setAttribute('text-anchor','middle');
    t.setAttribute('fill','transparent');
    t.textContent = h.id;
    layer.appendChild(t);
  });
}

/* =========================================================
   5) Selección + Panel inferior
   ========================================================= */
let currentId = null;
const sheet   = document.getElementById('sheet');
const shTitle = document.getElementById('sh-title');
const shTag   = document.getElementById('sh-tag');
const shGrid  = document.getElementById('sh-grid');
const shDesc  = document.getElementById('sh-desc');

function select(id){
  if(currentId === id){ closeSheet(); return; }
  currentId = id;
  document.querySelectorAll('#hotspots rect').forEach(r=>{
    r.classList.toggle('selected', r.dataset.id===id);
  });
  const d = DATA[id]; if(!d) return;
  sheet.classList.remove('hint');
  sheet.classList.add('open');
  shTag.textContent = d.label || id;
  shTitle.textContent = d.title || id;
  shGrid.innerHTML = `
    ${field('Calibre', d.calibre)}
    ${field('Sección', d.seccion)}
    ${field('Fase',    d.fase)}
    ${d.marca?field('Marca/Modelo', d.marca):''}
  `;
  shDesc.textContent = d.desc || '';
}
function field(k,v){ if(!v) return ''; return `<div class="info"><div class="k">${k}</div><div class="v">${v}</div></div>`; }

function closeSheet(){
  currentId = null;
  sheet.classList.remove('open');
  sheet.classList.add('hint');
  shTag.textContent = '—';
  shTitle.textContent = 'Toca un interruptor para ver detalles';
  shGrid.innerHTML = '';
  shDesc.textContent = '';
  document.querySelectorAll('#hotspots rect').forEach(r=>r.classList.remove('selected'));
}

/* =========================================================
   6) Toolbar: debug / reset / sheet drag
   ========================================================= */
document.getElementById('btn-debug').addEventListener('click', e=>{
  document.body.classList.toggle('debug');
  e.currentTarget.classList.toggle('active', document.body.classList.contains('debug'));
});
document.getElementById('btn-reset').addEventListener('click', closeSheet);
document.getElementById('sh-close').addEventListener('click', closeSheet);

// abrir/cerrar sheet tocando el "head"
sheet.querySelector('.head').addEventListener('click', (e)=>{
  if(e.target.closest('#sh-close')) return;
  if(sheet.classList.contains('hint')) return;
  sheet.classList.toggle('open');
});

/* =========================================================
   7) Init
   ========================================================= */
loadBoard();
</script>
</body>
</html>
